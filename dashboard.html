<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Farming Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <div class="top"><h1>🌾 Smart Farming System</h1></div>
    <div class="grid">
      <div class="card"><h2>📍 Farm Location</h2><p id="location">Detecting...</p></div>
      <div class="card"><h2>🌥️ Weather</h2><p id="weather">Loading...</p></div>
      <div class="card"><h2>🌱 Recommended Crops</h2><p id="crop">Calculating...</p></div>
      <div class="card"><h2>💧 Irrigation Advice</h2><p id="irrigation">Waiting...</p></div>
      <div class="card"><h2>🧪 Soil Suggestion</h2><p id="soil"></p></div>
      <div class="card"><h2>💹 Market Insight</h2><p id="market"></p></div>
      <div class="card"><h2>🚨 Alerts</h2><p id="alerts"></p></div>
      <div class="card"><h2>📈 Yield & Profit</h2><p id="yield"></p></div>
      <div class="card"><h2>🦠 Disease Risk</h2><p id="disease"></p></div>
      <div class="card"><h2>🎯 Best Selling</h2><p id="bestSell"></p></div>
      <div class="card full"><h2>📅 7-Day Forecast</h2><p id="forecast">Loading...</p></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
